<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KALNET | Redirecting Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Inter", sans-serif;
      background: #f8f7f4;
      color: #111827;
    }
    .card {
      width: min(92vw, 420px);
      padding: 36px;
      text-align: center;
      border-radius: 24px;
      background: #fff;
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.08);
    }
    .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 16px;
      border-radius: 50%;
      border: 3px solid rgba(79, 70, 229, 0.16);
      border-top-color: #4f46e5;
      animation: spin 0.8s linear infinite;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
    }
    p {
      margin: 10px 0 0;
      color: #6b7280;
      line-height: 1.6;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>Opening your dashboard</h1>
    <p>We are checking whether you should land in the recruiter workspace or the intern workspace.</p>
  </div>

  <script type="module">
    import { redirectAuthenticatedUserToDashboard } from "./portal-core.js";

    const redirected = await redirectAuthenticatedUserToDashboard();
    if (!redirected) {
      window.location.replace("index.html");
    }
  </script>
</body>
</html>
